name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Verify FastGA binaries
        run: |
          echo "Searching for FastGA binaries..."
          find target/release/build -name "FastGA" -o -name "GIXmake" -o -name "FAtoGDB" || true
          echo "Contents of build directories:"
          ls -la target/release/build/fastga-rs-*/out/ || true

      - name: Run tests
        run: |
          export TMPDIR="${{ runner.temp }}"
          cargo test --release

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check
